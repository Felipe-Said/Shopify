name: EverShop + testRigor CI (npm)

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  evershop-testrigor:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: evershop
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: evershop
      DB_SSLMODE: disable

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      # 🔥 FIX: Add EverShop CLI installation
      - name: Install EverShop CLI
        run: |
          npm install -g @evershop/cli
          evershop --version

      - name: Wait for database
        run: sleep 20

      - name: Run EverShop setup
        run: npm run setup

      - name: Create EverShop admin user
        env:
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASS }}
        run: |
          npm run user:create -- \
            --email "$ADMIN_EMAIL" \
            --password "$ADMIN_PASSWORD" \
            --name "Admin"

      - name: Build EverShop
        run: npm run build

      - name: Start EverShop
        run: |
          npm run start &
          sleep 25

      - name: Verify EverShop storefront is up
        run: curl -LI http://localhost:3000

      - name: Install testRigor CLI
        run: |
          npm install -g testrigor-cli
          testrigor --version

      - name: Run testRigor suite via CLI
